services:
  api:
    build: .
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379

  redis:
    image: redis:alpine
    restart: unless-stopped

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: