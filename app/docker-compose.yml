services:
  api:
    build: .
    restart: unless-stopped
    environment:
      - REDIS_URL=rediss://:${REDIS_PASSWORD}@redis:6380/0
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/watering
      - API_KEY=${API_KEY}
    volumes:
      - ./certs/ca.crt:/app/certs/ca.crt:ro
    depends_on:
      - redis
      - db

  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=watering
    volumes:
      - ./database/001-init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6380:6380"
    volumes:
      - ./redis.conf:/etc/redis/redis.conf:ro
      - ./certs:/etc/redis/certs:ro

  frontend:
    build: ../front
    restart: unless-stopped

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  pg_data: