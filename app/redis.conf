# ---- Sieć ----
# Wyłącz standardowy, nieszyfrowany port
port 0

# Włącz port TLS
tls-port 6380

# Nasłuchuj na wszystkich interfejsach
bind 0.0.0.0

# Tryb chroniony — wyłączony, bo wymuszamy hasło i TLS
protected-mode no

# ---- TLS / SSL ----
tls-cert-file /etc/redis/certs/redis.crt
tls-key-file /etc/redis/certs/redis.key
tls-ca-cert-file /etc/redis/certs/ca.crt

# Wymagaj TLS także dla replikacji i klastra
tls-auth-clients no
tls-replication yes
tls-cluster yes

# Minimalna wersja TLS
tls-protocols "TLSv1.2 TLSv1.3"

# ---- Hardening ----
# Wyłącz niebezpieczne komendy
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""

# ---- Logowanie ----
loglevel notice
